name: ipv6-research

topology:
  nodes:
    # --- 1. The Switch ---
    switch-br:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache bridge-utils
        - brctl addbr br0
        - brctl addif br0 eth1
        - brctl addif br0 eth2
        - brctl addif br0 eth3
        - brctl addif br0 eth4
        - brctl addif br0 eth5
        - brctl addif br0 eth6
        - brctl addif br0 eth7
        - brctl addif br0 eth8
        - brctl addif br0 eth9
        - brctl addif br0 eth10
        - brctl addif br0 eth11
        - brctl addif br0 eth12
        - brctl addif br0 eth13
        - brctl addif br0 eth14
        - brctl addif br0 eth15
        - brctl addif br0 eth16
        - brctl addif br0 eth17
        - brctl addif br0 eth18
        - brctl addif br0 eth19
        - brctl addif br0 eth20
        - brctl addif br0 eth21
        - brctl addif br0 eth22
        - ip link set dev br0 up

    # --- 2. The Router ---
    # sysctl forwarding is handled by the bash script at runtime, not here,
    # because debian:bookworm-slim has no sysctl binary pre-installed.
    router:
      kind: linux
      image: debian:bookworm-slim

    # --- 3. Victim Machines (20 total) ---
    victim:
      kind: linux
      image: debian:bookworm-slim
      exec:
        - sh -c "DEBIAN_FRONTEND=noninteractive apt-get update -qq && apt-get install -y -qq iproute2 ndisc6 iputils-ping"

    victim2:
